<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="Shortcut icon" href="./pokeball-transparent-png-2.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="box">

        <div id="ball">
            <img src="./pokeball.webp" alt="ball">
        </div>

        <div class="logo">
            <img src="./pokemon_logo.png" alt="Image not found">
        </div>

        <div class="text">
            <p class="gen">POKEMON GEN I</p>
            <h1 class="name">Pikachu</h1>
            <p class="desc">Pikachu is an Electric-type Pokemon introduced
            in Generation I. Pikachu are small, chubby,
            and incredibly cute mouse-like Pokemon.
            They are almost completely covered by yellow fur.</p>
            <p class="counter">—— 01/08</p>
        </div>

        <div id="innerbox"></div>

        <div class="image">
            <img src="./new_pikachu.png" alt="image not found">

            <div class="menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

    </div>
</body>
</html>
